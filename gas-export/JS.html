<script type="text/babel">
  /**
   * BOS OPS Cikijing Reporting System
   * Client-side JavaScript (React) - Full Version
   */

  const { useState, useEffect, useMemo, Fragment, useRef } = React;
  
  // Custom Stable Icon Component for GAS
  const Icon = ({ name, size = 24, className = "" }) => {
    const iconRef = useRef(null);
    useEffect(() => {
      if (window.lucide && iconRef.current) {
        iconRef.current.innerHTML = '';
        const iconData = window.lucide.icons[name];
        if (iconData) {
          window.lucide.createIcons({
            icons: { [name]: iconData },
            attrs: {
              width: size,
              height: size,
              class: className,
              'stroke-width': 2,
            }
          });
        }
      }
    }, [name, size, className]);

    const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
    return <i ref={iconRef} data-lucide={lucideName} className={className} style={{ width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></i>;
  };

  // Icon Wrappers
  const LayoutDashboard = (props) => <Icon name="layout-dashboard" {...props} />;
  const Database = (props) => <Icon name="database" {...props} />;
  const PieChart = (props) => <Icon name="pie-chart" {...props} />;
  const Wallet = (props) => <Icon name="wallet" {...props} />;
  const TrendingUp = (props) => <Icon name="trending-up" {...props} />;
  const TrendingDown = (props) => <Icon name="trending-down" {...props} />;
  const Printer = (props) => <Icon name="printer" {...props} />;
  const Settings = (props) => <Icon name="settings" {...props} />;
  const Search = (props) => <Icon name="search" {...props} />;
  const Upload = (props) => <Icon name="upload" {...props} />;
  const Plus = (props) => <Icon name="plus" {...props} />;
  const Trash2 = (props) => <Icon name="trash-2" {...props} />;
  const Edit2 = (props) => <Icon name="edit-2" {...props} />;
  const X = (props) => <Icon name="x" {...props} />;
  const Save = (props) => <Icon name="save" {...props} />;
  const ChevronRight = (props) => <Icon name="chevron-right" {...props} />;
  const Menu = (props) => <Icon name="menu" {...props} />;
  const User = (props) => <Icon name="user" {...props} />;
  const LogOut = (props) => <Icon name="log-out" {...props} />;
  const AlertCircle = (props) => <Icon name="alert-circle" {...props} />;
  const CheckCircle2 = (props) => <Icon name="check-circle-2" {...props} />;
  const FileText = (props) => <Icon name="file-text" {...props} />;
  const Download = (props) => <Icon name="download" {...props} />;

  const { motion, AnimatePresence } = window.FramerMotion || { 
    motion: { div: (props) => <div {...props} />, span: (props) => <span {...props} /> }, 
    AnimatePresence: ({ children }) => <>{children}</> 
  };

  // --- Utility Functions ---
  const formatCurrency = (val) => {
    return new Intl.NumberFormat('id-ID', {
      style: 'currency',
      currency: 'IDR',
      minimumFractionDigits: 0
    }).format(val);
  };

  const formatDate = (dateStr) => {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleDateString('id-ID', {
      day: '2-digit',
      month: 'long',
      year: 'numeric'
    });
  };

  // --- Login Page Component ---
  const LoginPage = ({ onLogin }) => {
    const [pass, setPass] = useState('');
    const [loading, setLoading] = useState(false);

    const handleSubmit = (e) => {
      e.preventDefault();
      setLoading(true);
      google.script.run
        .withSuccessHandler((success) => {
          if (success) {
            onLogin(pass);
          } else {
            alert('Password salah!');
            setLoading(false);
          }
        })
        .checkLogin(pass);
    };

    return (
      <div className="min-h-screen bg-[#E4E3E0] flex items-center justify-center p-4">
        <motion.div 
          initial={{ opacity: 0, y: 20 }}
          animate={{ opacity: 1, y: 0 }}
          className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-black/5"
        >
          <div className="text-center mb-8">
            <div className="w-16 h-16 bg-black rounded-2xl flex items-center justify-center mx-auto mb-4 text-white">
              <LayoutDashboard size={32} />
            </div>
            <h1 className="text-2xl font-bold text-gray-900">BOS OPS Cikijing</h1>
            <p className="text-gray-500 mt-2 italic font-serif">Sistem Laporan Realisasi</p>
          </div>

          <form onSubmit={handleSubmit} className="space-y-6">
            <div>
              <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Password Akses</label>
              <input 
                type="password" 
                value={pass}
                onChange={(e) => setPass(e.target.value)}
                className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all"
                placeholder="Masukkan password..."
                required
              />
            </div>
            <button 
              type="submit"
              disabled={loading}
              className="w-full bg-black text-white py-3 rounded-xl font-bold hover:bg-gray-800 transition-colors flex items-center justify-center gap-2 disabled:opacity-50"
            >
              {loading ? 'Memverifikasi...' : 'Masuk ke Sistem'} <ChevronRight size={18} />
            </button>
          </form>
        </motion.div>
      </div>
    );
  };

  // --- Main App Component ---
  const App = () => {
    const [isLoggedIn, setIsLoggedIn] = useState(false);
    const [activeTab, setActiveTab] = useState('dashboard');
    const [data, setData] = useState([]);
    const [profil, setProfil] = useState(null);
    const [loading, setLoading] = useState(true);
    const [sidebarOpen, setSidebarOpen] = useState(true);
    const [notification, setNotification] = useState(null);

    useEffect(() => {
      const savedLogin = localStorage.getItem('bos_ops_login');
      if (savedLogin === 'true') {
        setIsLoggedIn(true);
        fetchData();
      } else {
        setLoading(false);
      }
    }, []);

    const handleLogin = (pass) => {
      localStorage.setItem('bos_ops_login', 'true');
      setIsLoggedIn(true);
      fetchData();
    };

    const handleLogout = () => {
      localStorage.removeItem('bos_ops_login');
      setIsLoggedIn(false);
    };

    const fetchData = () => {
      setLoading(true);
      google.script.run
        .withSuccessHandler((allData) => {
          setData(allData);
          google.script.run
            .withSuccessHandler((p) => {
              setProfil(p);
              setLoading(false);
            })
            .getProfil();
        })
        .getAllData();
    };

    const showNotification = (message, type = 'success') => {
      setNotification({ message, type });
      setTimeout(() => setNotification(null), 3000);
    };

    const summary = useMemo(() => {
      let p1 = 0, p2 = 0, q1 = 0, q2 = 0;
      let honor = 0, sapras = 0, buku = 0;
      
      let t1_barang_siplah = 0, t1_barang_nonsiplah = 0;
      let t1_mesin_siplah = 0, t1_mesin_nonsiplah = 0;
      let t1_aset_siplah = 0, t1_aset_nonsiplah = 0;
      let t2_barang_siplah = 0, t2_barang_nonsiplah = 0;
      let t2_mesin_siplah = 0, t2_mesin_nonsiplah = 0;
      let t2_aset_siplah = 0, t2_aset_nonsiplah = 0;

      const pajakData = {};
      for (let m = 1; m <= 12; m++) {
        pajakData[m] = {
          ppn: { siplah: 0, nonsiplah: 0 },
          pph21: { siplah: 0, nonsiplah: 0 },
          pph22: { siplah: 0, nonsiplah: 0 },
          pph23: { siplah: 0, nonsiplah: 0 },
          sspd: { siplah: 0, nonsiplah: 0 }
        };
      }

      const safeData = Array.isArray(data) ? data : [];
      safeData.forEach(item => {
        const date = new Date(item.tanggal);
        const month = date.getMonth() + 1;
        const noBukti = (item.nobukti || '').toUpperCase();
        const rekening = (item.rekening || '');
        const transaksi = (item.transaksi || '').toLowerCase();
        const uraian = (item.uraian || '').toUpperCase();
        const keluar = Number(item.keluar) || 0;
        const terima = Number(item.terima) || 0;

        if (noBukti.startsWith('BBU')) {
          if (month >= 1 && month <= 6) p1 += terima;
          else if (month >= 7 && month <= 12) p2 += terima;
        } 
        
        if (keluar > 0) {
          if (month >= 1 && month <= 6) q1 += keluar;
          else if (month >= 7 && month <= 12) q2 += keluar;

          if (uraian.includes('HONOR') || uraian.includes('GAJI')) honor += keluar;
          if (uraian.includes('PEMELIHARAAN') || uraian.includes('SARANA')) sapras += keluar;
          if (uraian.includes('BUKU') || uraian.includes('PERPUSTAKAAN')) buku += keluar;

          const isSiplah = transaksi.includes('siplah') && !transaksi.includes('non');
          if (month >= 1 && month <= 6) {
            if (rekening.startsWith('5.1.02')) {
              if (isSiplah) t1_barang_siplah += keluar; else t1_barang_nonsiplah += keluar;
            } else if (rekening.startsWith('5.2.02')) {
              if (isSiplah) t1_mesin_siplah += keluar; else t1_mesin_nonsiplah += keluar;
            } else if (rekening.startsWith('5.2.05')) {
              if (isSiplah) t1_aset_siplah += keluar; else t1_aset_nonsiplah += keluar;
            }
          } else {
            if (rekening.startsWith('5.1.02')) {
              if (isSiplah) t2_barang_siplah += keluar; else t2_barang_nonsiplah += keluar;
            } else if (rekening.startsWith('5.2.02')) {
              if (isSiplah) t2_mesin_siplah += keluar; else t2_mesin_nonsiplah += keluar;
            } else if (rekening.startsWith('5.2.05')) {
              if (isSiplah) t2_aset_siplah += keluar; else t2_aset_nonsiplah += keluar;
            }
          }

          const isSiplahTax = isSiplah || (uraian.includes('SIPLAH') && !uraian.includes('NON'));
          const target = isSiplahTax ? 'siplah' : 'nonsiplah';
          if (uraian.includes('PPN')) pajakData[month].ppn[target] += keluar;
          if (uraian.includes('PPH 21') || uraian.includes('PPH21')) pajakData[month].pph21[target] += keluar;
          if (uraian.includes('PPH 22') || uraian.includes('PPH22')) pajakData[month].pph22[target] += keluar;
          if (uraian.includes('PPH 23') || uraian.includes('PPH23')) pajakData[month].pph23[target] += keluar;
          if (uraian.includes('SSPD')) pajakData[month].sspd[target] += keluar;
        }
      });

      return {
        penerimaanTahap1: p1, penerimaanTahap2: p2, totalTerima: p1 + p2,
        pengeluaranTahap1: q1, pengeluaranTahap2: q2, totalKeluar: q1 + q2,
        saldoTahap1: p1 - q1, saldoTahap2: (p1 + p2) - (q1 + q2),
        honorGuru: honor, sapras: sapras, buku: buku,
        realisasi: {
          t1: {
            barang: { siplah: t1_barang_siplah, nonsiplah: t1_barang_nonsiplah },
            mesin: { siplah: t1_mesin_siplah, nonsiplah: t1_mesin_nonsiplah },
            aset: { siplah: t1_aset_siplah, nonsiplah: t1_aset_nonsiplah }
          },
          t2: {
            barang: { siplah: t2_barang_siplah, nonsiplah: t2_barang_nonsiplah },
            mesin: { siplah: t2_mesin_siplah, nonsiplah: t2_mesin_nonsiplah },
            aset: { siplah: t2_aset_siplah, nonsiplah: t2_aset_nonsiplah }
          }
        },
        pajak: pajakData
      };
    }, [data]);

    if (!isLoggedIn) {
      return <LoginPage onLogin={handleLogin} />;
    }

    if (loading) {
      return (
        <div className="fixed inset-0 flex flex-col items-center justify-center bg-white z-50">
          <div className="w-16 h-16 border-4 border-black border-t-transparent rounded-full animate-spin mb-4"></div>
          <p className="font-bold text-gray-400 uppercase tracking-widest text-xs">Memuat Sistem...</p>
        </div>
      );
    }

    return (
      <div className="flex min-h-screen bg-[#F8F7F4]">
        {/* Sidebar */}
        <aside className={`bg-white border-r border-gray-100 transition-all duration-300 ${sidebarOpen ? 'w-72' : 'w-20'} flex flex-col print:hidden`}>
          <div className="p-6 flex items-center gap-4 border-b border-gray-50">
            <div className="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-white flex-shrink-0">
              <FileText size={20} />
            </div>
            {sidebarOpen && (
              <div className="overflow-hidden whitespace-nowrap">
                <h1 className="font-bold text-sm leading-tight">BOS OPS</h1>
                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Cikijing Reporting</p>
              </div>
            )}
          </div>

          <nav className="flex-grow p-4 space-y-2 overflow-y-auto">
            <NavItem active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={<LayoutDashboard size={18} />} label="Dashboard" open={sidebarOpen} />
            <NavItem active={activeTab === 'data'} onClick={() => setActiveTab('data')} icon={<Database size={18} />} label="Data Transaksi" open={sidebarOpen} />
            <NavItem active={activeTab === 'strategis'} onClick={() => setActiveTab('strategis')} icon={<PieChart size={18} />} label="Alokasi Strategis" open={sidebarOpen} />
            <NavItem active={activeTab === 'realisasi'} onClick={() => setActiveTab('realisasi')} icon={<Wallet size={18} />} label="Realisasi Belanja" open={sidebarOpen} />
            <NavItem active={activeTab === 'pajak'} onClick={() => setActiveTab('pajak')} icon={<TrendingUp size={18} />} label="Setor Pajak" open={sidebarOpen} />
            <NavItem active={activeTab === 'bku'} onClick={() => setActiveTab('bku')} icon={<Printer size={18} />} label="Cetak BKU" open={sidebarOpen} />
            <NavItem active={activeTab === 'profil'} onClick={() => setActiveTab('profil')} icon={<Settings size={18} />} label="Profil Sekolah" open={sidebarOpen} />
          </nav>

          <div className="p-4 border-t border-gray-50 space-y-2">
            <button onClick={handleLogout} className="w-full flex items-center gap-4 px-4 py-3 text-rose-500 hover:bg-rose-50 rounded-xl transition-all font-bold text-sm">
              <LogOut size={20} />
              {sidebarOpen && <span>Keluar</span>}
            </button>
            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="w-full flex items-center justify-center p-2 text-gray-400 hover:text-black hover:bg-gray-50 rounded-xl transition-all">
              <Menu size={20} />
            </button>
          </div>
        </aside>

        {/* Main Content */}
        <main className="flex-grow flex flex-col min-w-0">
          <header className="bg-white/80 backdrop-blur-md border-b border-gray-100 h-20 flex items-center justify-between px-8 sticky top-0 z-30 print:hidden">
            <div className="flex items-center gap-4">
              <h2 className="font-bold text-xl capitalize">{activeTab.replace('-', ' ')}</h2>
              <div className="h-4 w-px bg-gray-200"></div>
              <p className="text-xs text-gray-400 font-bold uppercase tracking-widest">{profil?.nama}</p>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-right">
                <p className="text-xs font-bold">{profil?.kepsek}</p>
                <p className="text-[10px] text-gray-400 uppercase tracking-wider">Kepala Sekolah</p>
              </div>
              <div className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 border border-gray-200">
                <User size={20} />
              </div>
            </div>
          </header>

          <div className="p-8 flex-grow">
            <AnimatePresence mode="wait">
              <motion.div
                key={activeTab}
                initial={{ opacity: 0, y: 10 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: -10 }}
                transition={{ duration: 0.2 }}
              >
                {activeTab === 'dashboard' && <Dashboard summary={summary} data={data} />}
                {activeTab === 'data' && <DataManagement data={data} onRefresh={fetchData} showNotification={showNotification} />}
                {activeTab === 'strategis' && <StrategicAllocation summary={summary} />}
                {activeTab === 'realisasi' && <RealisasiBelanja summary={summary} />}
                {activeTab === 'pajak' && <SetorPajak summary={summary} />}
                {activeTab === 'bku' && <BKUPrint data={data} profil={profil} />}
                {activeTab === 'profil' && <ProfileSettings profil={profil} onRefresh={fetchData} showNotification={showNotification} />}
              </motion.div>
            </AnimatePresence>
          </div>
        </main>

        {/* Notification Toast */}
        <AnimatePresence>
          {notification && (
            <motion.div 
              initial={{ opacity: 0, y: 50 }}
              animate={{ opacity: 1, y: 0 }}
              exit={{ opacity: 0, y: 50 }}
              className={`fixed bottom-8 right-8 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border ${notification.type === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' : 'bg-rose-50 border-rose-100 text-rose-800'}`}
            >
              {notification.type === 'success' ? <CheckCircle2 size={20} /> : <AlertCircle size={20} />}
              <p className="font-bold text-sm">{notification.message}</p>
            </motion.div>
          )}
        </AnimatePresence>
      </div>
    );
  };

  const NavItem = ({ active, onClick, icon, label, open }) => (
    <button 
      onClick={onClick}
      className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-bold transition-all ${active ? 'bg-black text-white shadow-lg shadow-black/10' : 'text-gray-500 hover:bg-gray-50 hover:text-black'}`}
    >
      <div className="flex-shrink-0">{icon}</div>
      {open && <span className="overflow-hidden whitespace-nowrap">{label}</span>}
    </button>
  );

  // --- Dashboard Component ---
  const Dashboard = ({ summary, data }) => {
    return (
      <div className="space-y-6">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          <SummaryCard title="Total Penerimaan" icon={<TrendingUp size={24} />} color="emerald" t1={summary.penerimaanTahap1} t2={summary.penerimaanTahap2} total={summary.totalTerima} />
          <SummaryCard title="Total Pengeluaran" icon={<TrendingDown size={24} />} color="rose" t1={summary.pengeluaranTahap1} t2={summary.pengeluaranTahap2} total={summary.totalKeluar} />
          <SummaryCard title="Saldo Per Tahap" icon={<Wallet size={24} />} color="blue" t1={summary.saldoTahap1} t2={summary.saldoTahap2} total={summary.saldoTahap2} />
        </div>

        <div className="bg-white rounded-2xl border border-black/5 shadow-sm overflow-hidden">
          <div className="p-6 border-b border-gray-50 flex items-center justify-between">
            <h2 className="font-bold text-lg">Transaksi Terbaru</h2>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-left">
              <thead>
                <tr className="bg-gray-50/50">
                  <th className="px-6 py-4 text-xs font-bold uppercase tracking-wider text-gray-500">Tanggal</th>
                  <th className="px-6 py-4 text-xs font-bold uppercase tracking-wider text-gray-500">No. Bukti</th>
                  <th className="px-6 py-4 text-xs font-bold uppercase tracking-wider text-gray-500">Uraian</th>
                  <th className="px-6 py-4 text-xs font-bold uppercase tracking-wider text-gray-500 text-right">Jumlah</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {(data || []).slice(0, 5).map((item, idx) => (
                  <tr key={idx} className="hover:bg-gray-50 transition-colors">
                    <td className="px-6 py-4 text-sm text-gray-600">{formatDate(item.tanggal)}</td>
                    <td className="px-6 py-4 text-sm font-mono text-gray-900">{item.nobukti}</td>
                    <td className="px-6 py-4 text-sm text-gray-600">{item.uraian}</td>
                    <td className={`px-6 py-4 text-sm font-bold text-right ${item.keluar > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>
                      {item.keluar > 0 ? `-Rp. ${item.keluar.toLocaleString('id-ID')}` : `+Rp. ${item.terima.toLocaleString('id-ID')}`}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  };

  const SummaryCard = ({ title, icon, color, t1, t2, total }) => {
    const colors = {
      emerald: 'bg-emerald-50 text-emerald-600 border-emerald-100',
      rose: 'bg-rose-50 text-rose-600 border-rose-100',
      blue: 'bg-blue-50 text-blue-600 border-blue-100'
    };
    return (
      <div className="bg-white p-6 rounded-2xl border border-black/5 shadow-sm space-y-4">
        <div className="flex items-center gap-4">
          <div className={`p-3 rounded-xl ${colors[color]}`}>{icon}</div>
          <span className="text-xs font-bold uppercase tracking-wider text-gray-400">{title}</span>
        </div>
        <div className="space-y-3">
          <div className="flex justify-between text-sm">
            <span className="text-gray-500">Tahap I</span>
            <span className="font-mono font-bold">Rp {t1.toLocaleString('id-ID')}</span>
          </div>
          <div className="flex justify-between text-sm">
            <span className="text-gray-500">Tahap II</span>
            <span className="font-mono font-bold">Rp {t2.toLocaleString('id-ID')}</span>
          </div>
          <div className="pt-3 border-t border-gray-50 flex justify-between items-center">
            <span className="font-bold">Total</span>
            <span className={`text-xl font-mono font-bold ${color === 'emerald' ? 'text-emerald-600' : color === 'rose' ? 'text-rose-600' : 'text-blue-600'}`}>
              Rp {total.toLocaleString('id-ID')}
            </span>
          </div>
        </div>
      </div>
    );
  };

  // --- Data Management Component ---
  const DataManagement = ({ data, onRefresh, showNotification }) => {
    const [searchTerm, setSearchTerm] = useState('');
    const [isImporting, setIsImporting] = useState(false);
    const [importText, setImportText] = useState('');
    const [editingItem, setEditingItem] = useState(null);

    const filteredData = (data || []).filter(item => 
      (item.uraian || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
      (item.nobukti || '').toLowerCase().includes(searchTerm.toLowerCase())
    );

    const handleImport = () => {
      const lines = importText.trim().split('\n');
      const items = [];
      lines.forEach(line => {
        const cols = line.split('\t');
        if (cols.length >= 7) {
          items.push({
            tanggal: cols[0],
            kegiatan: cols[1],
            rekening: cols[2],
            nobukti: cols[3],
            uraian: cols[4],
            terima: Number(cols[5].replace(/[^\d]/g, '')) || 0,
            keluar: Number(cols[6].replace(/[^\d]/g, '')) || 0,
            transaksi: cols[cols.length - 1]
          });
        }
      });

      if (items.length > 0) {
        google.script.run
          .withSuccessHandler((res) => {
            if (res.success) {
              showNotification(`Berhasil mengimpor ${res.count} data.`);
              setIsImporting(false);
              setImportText('');
              fetchData();
            } else {
              alert('Gagal impor: ' + res.error);
            }
          })
          .saveDataBatch(items);
      }
    };

    const handleDelete = (id) => {
      if (confirm('Hapus transaksi ini?')) {
        google.script.run
          .withSuccessHandler(() => {
            showNotification('Data berhasil dihapus.');
            onRefresh();
          })
          .deleteData(id);
      }
    };

    const handleSave = (e) => {
      e.preventDefault();
      google.script.run
        .withSuccessHandler(() => {
          showNotification('Data berhasil disimpan.');
          setEditingItem(null);
          onRefresh();
        })
        .saveData(editingItem);
    };

    return (
      <div className="space-y-6">
        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div className="relative flex-1 max-w-md">
            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={18} />
            <input 
              type="text" placeholder="Cari uraian atau no. bukti..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
              className="w-full pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-black outline-none transition-all"
            />
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => setIsImporting(true)} className="flex items-center gap-2 bg-black text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-gray-800 transition-colors">
              <Upload size={16} /> Impor Data
            </button>
            <button onClick={() => setEditingItem({ tanggal: new Date().toISOString().split('T')[0], uraian: '', terima: 0, keluar: 0, transaksi: '' })} className="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-emerald-700 transition-colors">
              <Plus size={16} /> Tambah Baru
            </button>
          </div>
        </div>

        {isImporting && (
          <div className="bg-white p-6 rounded-2xl border border-black/5 shadow-sm mb-6">
            <h3 className="font-bold mb-2">Impor Data (Tab Separated)</h3>
            <textarea value={importText} onChange={(e) => setImportText(e.target.value)} className="w-full h-48 p-4 bg-gray-50 border border-gray-200 rounded-xl font-mono text-xs outline-none focus:border-black mb-4" placeholder="Tanggal	Kegiatan	Rekening	NoBukti	Uraian	Terima	Keluar	...	Transaksi" />
            <div className="flex justify-end gap-2">
              <button onClick={() => setIsImporting(false)} className="px-4 py-2 text-sm font-bold text-gray-400">Batal</button>
              <button onClick={handleImport} className="bg-black text-white px-6 py-2 rounded-xl font-bold text-sm">Proses Impor</button>
            </div>
          </div>
        )}

        {editingItem && (
          <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden">
              <div className="p-6 border-b border-gray-50 flex items-center justify-between">
                <h3 className="text-xl font-bold">{editingItem.id ? 'Edit Transaksi' : 'Tambah Transaksi'}</h3>
                <button onClick={() => setEditingItem(null)}><X size={24} /></button>
              </div>
              <form onSubmit={handleSave} className="p-6 space-y-4">
                <div className="grid grid-cols-2 gap-4">
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold uppercase text-gray-400">Tanggal</label>
                    <input type="date" value={editingItem.tanggal} onChange={(e) => setEditingItem({...editingItem, tanggal: e.target.value})} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl" required />
                  </div>
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold uppercase text-gray-400">No. Bukti</label>
                    <input type="text" value={editingItem.nobukti} onChange={(e) => setEditingItem({...editingItem, nobukti: e.target.value})} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl" />
                  </div>
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] font-bold uppercase text-gray-400">Uraian</label>
                  <textarea value={editingItem.uraian} onChange={(e) => setEditingItem({...editingItem, uraian: e.target.value})} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl h-20" required />
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold uppercase text-gray-400">Penerimaan</label>
                    <input type="number" value={editingItem.terima} onChange={(e) => setEditingItem({...editingItem, terima: e.target.value})} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl" />
                  </div>
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold uppercase text-gray-400">Pengeluaran</label>
                    <input type="number" value={editingItem.keluar} onChange={(e) => setEditingItem({...editingItem, keluar: e.target.value})} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl" />
                  </div>
                </div>
                <div className="flex justify-end gap-2 pt-4">
                  <button type="button" onClick={() => setEditingItem(null)} className="px-6 py-2 font-bold text-gray-400">Batal</button>
                  <button type="submit" className="bg-black text-white px-8 py-2 rounded-xl font-bold">Simpan</button>
                </div>
              </form>
            </div>
          </div>
        )}

        <div className="bg-white rounded-2xl border border-black/5 shadow-sm overflow-hidden">
          <table className="w-full text-left">
            <thead>
              <tr className="bg-gray-50/50">
                <th className="px-6 py-4 text-xs font-bold uppercase text-gray-500">Tanggal</th>
                <th className="px-6 py-4 text-xs font-bold uppercase text-gray-500">Uraian</th>
                <th className="px-6 py-4 text-xs font-bold uppercase text-gray-500 text-right">Terima</th>
                <th className="px-6 py-4 text-xs font-bold uppercase text-gray-500 text-right">Keluar</th>
                <th className="px-6 py-4 text-xs font-bold uppercase text-gray-500 text-center">Aksi</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-50">
              {filteredData.map((item, idx) => (
                <tr key={idx} className="hover:bg-gray-50">
                  <td className="px-6 py-4 text-sm text-gray-600">{formatDate(item.tanggal)}</td>
                  <td className="px-6 py-4 text-sm text-gray-900 font-medium">{item.uraian}</td>
                  <td className="px-6 py-4 text-sm text-emerald-600 text-right font-mono font-bold">{item.terima > 0 ? item.terima.toLocaleString('id-ID') : '-'}</td>
                  <td className="px-6 py-4 text-sm text-rose-600 text-right font-mono font-bold">{item.keluar > 0 ? item.keluar.toLocaleString('id-ID') : '-'}</td>
                  <td className="px-6 py-4 text-center">
                    <div className="flex items-center justify-center gap-2">
                      <button onClick={() => setEditingItem(item)} className="p-2 text-gray-400 hover:text-black"><Edit2 size={16} /></button>
                      <button onClick={() => handleDelete(item.id)} className="p-2 text-gray-400 hover:text-rose-600"><Trash2 size={16} /></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  // --- Strategic Allocation Component ---
  const StrategicAllocation = ({ summary }) => {
    const totalTerima = summary.totalTerima || 1;
    const allocations = [
      { label: 'Pembayaran Honor Guru', code: '07.12', value: summary.honorGuru, color: 'bg-indigo-500', textColor: 'text-indigo-600', bgColor: 'bg-indigo-50', description: 'Total pengeluaran untuk honorarium guru dan tenaga kependidikan.' },
      { label: 'Pemeliharaan Sarana & Prasarana', code: '05.08', value: summary.sapras, color: 'bg-amber-500', textColor: 'text-amber-600', bgColor: 'bg-amber-50', description: 'Total pengeluaran untuk pemeliharaan gedung dan fasilitas sekolah.' },
      { label: 'Pengadaan Buku & Koleksi Perpustakaan', code: '05.02', value: summary.buku, color: 'bg-emerald-500', textColor: 'text-emerald-600', bgColor: 'bg-emerald-50', description: 'Total pengeluaran untuk buku teks, buku bacaan, dan perpustakaan.' }
    ];

    return (
      <div className="space-y-6">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          {allocations.map((item, idx) => {
            const percentage = (item.value / totalTerima) * 100;
            return (
              <motion.div key={idx} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: idx * 0.1 }} className="bg-white p-6 rounded-2xl border border-black/5 shadow-sm space-y-4">
                <div className="flex items-center justify-between">
                  <div className={`p-3 ${item.bgColor} ${item.textColor} rounded-xl`}><PieChart size={24} /></div>
                  <span className="text-[10px] font-bold uppercase tracking-widest text-gray-400">Kode: {item.code}</span>
                </div>
                <div>
                  <h3 className="font-bold text-gray-900 leading-tight">{item.label}</h3>
                  <p className="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-wider">Alokasi Strategis</p>
                </div>
                <div className="space-y-2 pt-2">
                  <div className="flex justify-between items-end">
                    <span className="text-2xl font-mono font-bold text-gray-900">Rp {item.value.toLocaleString('id-ID')}</span>
                    <span className={`text-sm font-bold ${item.textColor}`}>{percentage.toFixed(1)}%</span>
                  </div>
                  <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                    <motion.div initial={{ width: 0 }} animate={{ width: `${Math.min(percentage, 100)}%` }} transition={{ duration: 1 }} className={`h-full ${item.color}`} />
                  </div>
                </div>
                <p className="text-xs text-gray-500 leading-relaxed pt-2 border-t border-gray-50">{item.description}</p>
              </motion.div>
            );
          })}
        </div>
      </div>
    );
  };

  // --- Realisasi Belanja Component ---
  const RealisasiBelanja = ({ summary }) => {
    const r = summary.realisasi;
    const rows = [
      { label: 'Belanja Barang & Jasa', code: '5.1.02', t1_siplah: r.t1.barang.siplah, t1_non: r.t1.barang.nonsiplah, t2_siplah: r.t2.barang.siplah, t2_non: r.t2.barang.nonsiplah, color: 'bg-orange-50' },
      { label: 'Belanja Peralatan & Mesin', code: '5.2.02', t1_siplah: r.t1.mesin.siplah, t1_non: r.t1.mesin.nonsiplah, t2_siplah: r.t2.mesin.siplah, t2_non: r.t2.mesin.nonsiplah, color: 'bg-blue-50' },
      { label: 'Belanja Aset Tetap Lainnya', code: '5.2.05', t1_siplah: r.t1.aset.siplah, t1_non: r.t1.aset.nonsiplah, t2_siplah: r.t2.aset.siplah, t2_non: r.t2.aset.nonsiplah, color: 'bg-teal-50' }
    ];

    return (
      <div className="bg-white rounded-2xl border border-black/5 shadow-sm overflow-hidden">
        <div className="p-6 border-b border-gray-100">
          <h2 className="font-bold text-lg">Tabel Realisasi Belanja</h2>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-50 text-gray-500 font-bold uppercase text-[10px]">
                <th className="px-6 py-4 text-left">Belanja</th>
                <th className="px-6 py-4 text-left">Transaksi</th>
                <th className="px-6 py-4 text-right">Tahap 1</th>
                <th className="px-6 py-4 text-right">Tahap 2</th>
                <th className="px-6 py-4 text-right">Jumlah</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {rows.map((row, idx) => (
                <Fragment key={idx}>
                  <tr className={`${row.color}/30`}>
                    <td rowSpan={2} className="px-6 py-4 font-bold border-r border-gray-100">{row.label}<div className="text-[10px] text-gray-400 font-normal">Kode: {row.code}</div></td>
                    <td className="px-6 py-2">SiPLah</td>
                    <td className="px-6 py-2 text-right font-mono">Rp {row.t1_siplah.toLocaleString('id-ID')}</td>
                    <td className="px-6 py-2 text-right font-mono">Rp {row.t2_siplah.toLocaleString('id-ID')}</td>
                    <td className="px-6 py-2 text-right font-mono font-bold">Rp {(row.t1_siplah + row.t2_siplah).toLocaleString('id-ID')}</td>
                  </tr>
                  <tr className={`${row.color}/10`}>
                    <td className="px-6 py-2">Non-SiPLah</td>
                    <td className="px-6 py-2 text-right font-mono">Rp {row.t1_non.toLocaleString('id-ID')}</td>
                    <td className="px-6 py-2 text-right font-mono">Rp {row.t2_non.toLocaleString('id-ID')}</td>
                    <td className="px-6 py-2 text-right font-mono font-bold">Rp {(row.t1_non + row.t2_non).toLocaleString('id-ID')}</td>
                  </tr>
                </Fragment>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  // --- Setor Pajak Component ---
  const SetorPajak = ({ summary }) => {
    const p = summary.pajak;
    const taxTypes = [
      { id: 'ppn', label: 'PPN' },
      { id: 'pph21', label: 'PPh 21' },
      { id: 'pph22', label: 'PPh 22' },
      { id: 'pph23', label: 'PPh 23' },
      { id: 'sspd', label: 'SSPD' }
    ];
    const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

    return (
      <div className="bg-white rounded-2xl border border-black/5 shadow-sm overflow-hidden">
        <div className="p-6 border-b border-gray-100">
          <h2 className="font-bold text-lg">Tabel Setor Pajak</h2>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-[10px] border-collapse">
            <thead>
              <tr className="bg-emerald-50 text-emerald-800 font-bold uppercase">
                <th className="px-2 py-3 border border-emerald-100 text-left">Bulan</th>
                {taxTypes.map(t => <th key={t.id} colSpan={2} className="px-2 py-3 border border-emerald-100 text-center">{t.label}</th>)}
                <th className="px-2 py-3 border border-emerald-100 text-right">Total</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {months.map((name, idx) => {
                const m = idx + 1;
                let monthTotal = 0;
                taxTypes.forEach(t => monthTotal += p[m][t.id].siplah + p[m][t.id].nonsiplah);
                return (
                  <tr key={m} className="hover:bg-gray-50">
                    <td className="px-2 py-2 border border-gray-100 font-bold">{name}</td>
                    {taxTypes.map(t => (
                      <Fragment key={t.id}>
                        <td className="px-1 py-2 border border-gray-100 text-right font-mono">{p[m][t.id].siplah > 0 ? p[m][t.id].siplah.toLocaleString('id-ID') : '-'}</td>
                        <td className="px-1 py-2 border border-gray-100 text-right font-mono">{p[m][t.id].nonsiplah > 0 ? p[m][t.id].nonsiplah.toLocaleString('id-ID') : '-'}</td>
                      </Fragment>
                    ))}
                    <td className="px-2 py-2 border border-gray-100 text-right font-mono font-bold bg-gray-50">{monthTotal > 0 ? monthTotal.toLocaleString('id-ID') : '-'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  const BKUPrint = ({ data, profil }) => {
    const [selected, setSelected] = useState('');
    const bkuData = data.find(item => item.nobukti === selected);
    return (
      <div className="space-y-6">
        <div className="bg-white p-6 rounded-2xl border border-black/5 shadow-sm print:hidden flex gap-4">
          <select value={selected} onChange={(e) => setSelected(e.target.value)} className="flex-1 px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl">
            <option value="">-- Pilih Nomor Bukti --</option>
            {data && data.filter(i => i.keluar > 0).map(i => <option key={i.id} value={i.nobukti}>{i.nobukti} - {i.uraian.substring(0, 30)}...</option>)}
          </select>
          <button onClick={() => window.print()} className="bg-black text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2"><Printer size={18} /> Cetak</button>
        </div>
        {bkuData && (
          <div className="bg-white p-12 rounded-2xl border border-black/5 shadow-sm mx-auto w-[21cm] h-[33cm] font-serif print:w-full print:h-full print:border-none print:shadow-none">
            <div className="border-b-2 border-black pb-4 mb-8 flex justify-between items-start">
              <h1 className="text-2xl font-bold italic">Lampiran Bukti BKU</h1>
              <div className="text-right">
                <p className="font-bold">Nomor: {bkuData.nobukti}</p>
                <p className="text-sm">Tanggal: {formatDate(bkuData.tanggal)}</p>
              </div>
            </div>
            <div className="flex-grow flex flex-col justify-center space-y-8 py-20">
              <div className="grid grid-cols-[200px_1fr] gap-4 text-xl">
                <div className="font-bold">Besarnya</div>
                <div>: Rp {bkuData.keluar.toLocaleString('id-ID')}</div>
              </div>
              <div className="grid grid-cols-[200px_1fr] gap-4 text-xl">
                <div className="font-bold">Uraian</div>
                <div className="italic">: {bkuData.uraian}</div>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-12 pt-20">
              <div className="text-center space-y-20">
                <p>Disetujui,<br/>Kepala Sekolah</p>
                <p className="font-bold underline">{profil.kepsek}</p>
              </div>
              <div className="text-center space-y-20">
                <p>Bendahara,</p>
                <p className="font-bold underline">{profil.bendahara}</p>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  const ProfileSettings = ({ profil, onRefresh, showNotification }) => {
    const [p, setP] = useState(profil);
    const handleSave = () => {
      google.script.run
        .withSuccessHandler(() => {
          showNotification('Profil berhasil diperbarui.');
          onRefresh();
        })
        .updateProfil(p);
    };
    return (
      <div className="bg-white p-8 rounded-2xl border border-black/5 shadow-sm max-w-2xl mx-auto space-y-6">
        <div className="grid grid-cols-1 gap-4">
          <ProfileInput label="Nama Sekolah" value={p.nama} onChange={(v) => setP({...p, nama: v})} />
          <ProfileInput label="Kepala Sekolah" value={p.kepsek} onChange={(v) => setP({...p, kepsek: v})} />
          <ProfileInput label="NIP Kepala Sekolah" value={p.nipKepsek} onChange={(v) => setP({...p, nipKepsek: v})} />
          <ProfileInput label="Bendahara" value={p.bendahara} onChange={(v) => setP({...p, bendahara: v})} />
          <ProfileInput label="NIP Bendahara" value={p.nipBendahara} onChange={(v) => setP({...p, nipBendahara: v})} />
          <ProfileInput label="Password Akses" value={p.pass} onChange={(v) => setP({...p, pass: v})} />
        </div>
        <button onClick={handleSave} className="w-full bg-black text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2"><Save size={18} /> Simpan Profil</button>
      </div>
    );
  };

  const ProfileInput = ({ label, value, onChange }) => (
    <div className="space-y-1">
      <label className="text-[10px] font-bold uppercase text-gray-400">{label}</label>
      <input type="text" value={value} onChange={(e) => onChange(e.target.value)} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl" />
    </div>
  );

  // Render App
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
